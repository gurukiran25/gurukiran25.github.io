<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F0F14'/%3E%3Ctext x='32' y='44' font-family='monospace' font-size='34' font-weight='800' fill='%23F5A623' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" defer></script>
<style>
  :root{
    --bg:#0F0F14;
    --bg-raised:#16161D;
    --panel:#1B1B24;
    --border:#2C2C3A;
    --amber:#F5A623;
    --violet:#8B7FD6;
    --text:#F2F2F5;
    --muted:#9494A3;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
    --r-sm:12px;
    --r-md:16px;
    --r-lg:20px;
    --r-pill:999px;
    --section-y:110px;
    --section-y-mobile:64px;
    --glass-bg:rgba(27,27,36,0.5);
    --glass-bg-strong:rgba(27,27,36,0.62);
    --glass-border:rgba(255,255,255,0.09);
    --glass-blur:blur(16px) saturate(150%);
    --glass-sheen:rgba(255,255,255,0.06);
  }
  body.light{
    --glass-bg:rgba(255,255,255,0.5);
    --glass-bg-strong:rgba(255,255,255,0.62);
    --glass-border:rgba(27,27,36,0.08);
    --glass-sheen:rgba(255,255,255,0.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;overflow-x:hidden;position:relative;}
  body.loading{overflow:hidden;}
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(500px circle at 30% 80%, rgba(139,127,214,0.05), transparent 60%);
  }
  .bg-3d{position:fixed;inset:0;z-index:-1;pointer-events:none;perspective:1000px;overflow:hidden;}
  .bg-blob{
    position:absolute;border-radius:50%;filter:blur(60px);
    transform:translate3d(0,0,0);
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  .bg-blob-1{
    width:600px;height:600px;top:-10%;left:5%;
    background:radial-gradient(circle, rgba(139,127,214,0.20), transparent 65%);
  }
  .bg-blob-2{
    width:520px;height:520px;top:15%;right:0%;
    background:radial-gradient(circle, rgba(245,166,35,0.14), transparent 65%);
  }
  .bg-blob-3{
    width:480px;height:480px;bottom:-10%;left:25%;
    background:radial-gradient(circle, rgba(139,127,214,0.12), transparent 65%);
  }
  @media(max-width:768px){
    .bg-blob{filter:blur(46px);}
    .bg-blob-1{width:380px;height:380px;}
    .bg-blob-2{width:340px;height:340px;}
    .bg-blob-3{width:320px;height:320px;}
  }

  /* ===== ANIMATED ENGINEERING BACKGROUND ===== */
  /* A layer of slow-drifting tech/engineering glyphs behind every section.
     Wrap div gets a continuous drift + mouse/scroll parallax transform from
     JS (one rAF loop, so nothing fights); the inner icon runs its own
     independent bob+rotate CSS animation on top. */
  .eng-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  .eng-icon-wrap{position:absolute;will-change:transform;}
  .eng-icon{
    display:inline-block;opacity:.32;filter:drop-shadow(0 0 10px rgba(0,0,0,0.25));
    animation:engFloat linear infinite;will-change:transform;user-select:none;
  }
  .eng-icon.eng-code{
    font-family:var(--mono);font-weight:700;opacity:.22;color:var(--amber);
    filter:none;text-shadow:0 0 12px rgba(245,166,35,0.25);
  }
  .eng-icon.eng-code.violet{color:var(--violet);text-shadow:0 0 12px rgba(139,127,214,0.25);}
  @keyframes engFloat{
    0%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-18px) rotate(9deg);}
    100%{transform:translateY(0) rotate(0deg);}
  }
  @media(max-width:768px){ .eng-icon{opacity:.22;} .eng-icon.eng-code{opacity:.16;} }
  @media(prefers-reduced-motion:reduce){ .eng-icon{animation:none;} }
  body.light .eng-icon{opacity:.24;filter:drop-shadow(0 0 8px rgba(0,0,0,0.08));}
  body.light .eng-icon.eng-code{opacity:.28;}

  /* ===== CIRCUIT LINES (very quiet, animated trace layer) ===== */
  .circuit-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;opacity:.5;}
  .circuit-bg path{
    fill:none;stroke-width:1;stroke-dasharray:6 10;
    animation:circuitFlow 14s linear infinite;
  }
  @keyframes circuitFlow{ to{ stroke-dashoffset:-320; } }
  @media(prefers-reduced-motion:reduce){ .circuit-bg path{animation:none;} }
  @media(max-width:768px){ .circuit-bg{opacity:.32;} }
  ::selection{background:var(--amber);color:#0F0F14;}
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline:2px solid var(--amber);outline-offset:3px;border-radius:4px;
  }
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:720px;margin:0 auto;padding:0 24px;}
  img{max-width:100%;display:block;}

  /* NAV */
  nav{position:sticky;top:0;z-index:50;background:rgba(15,15,20,0.6);backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%);border-bottom:1px solid var(--glass-border);}

  /* ===== GLASS / WATER EFFECT ===== */
  .glass-card{
    position:relative;
    background:var(--glass-bg) !important;
    backdrop-filter:var(--glass-blur);
    -webkit-backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-border) !important;
    overflow:hidden;
    isolation:isolate;
  }
  .glass-card::before{
    /* glass rim highlight, like light catching the edge of water */
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:1;
    background:linear-gradient(160deg, var(--glass-sheen) 0%, transparent 35%);
    mix-blend-mode:overlay;
  }
  .glass-card::after{
    /* mouse-tracked ripple / water shine */
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:1;
    background:radial-gradient(240px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.14), transparent 60%);
    opacity:0;transition:opacity .4s ease;
  }
  .glass-card:hover::after{opacity:1;}
  @media(hover:none){ .glass-card::after{display:none;} }
  nav .wrap{display:flex;justify-content:space-between;align-items:center;height:58px;}
  .logo{font-family:var(--mono);font-weight:700;color:var(--amber);font-size:15px;}
  .navlinks{display:flex;gap:22px;font-family:var(--mono);font-size:12px;color:var(--muted);align-items:center;}
  .navlinks a{position:relative;padding:4px 0;transition:color .2s ease;}
  .navlinks a:hover{color:var(--amber);}
  .navlinks a::after{
    content:"";position:absolute;left:0;bottom:-3px;width:0;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--amber),var(--violet));transition:width .25s ease;
  }
  .navlinks a:hover::after{width:100%;}
  .navlinks a.active{color:var(--amber);}
  .navlinks a.active::after{width:100%;}
  @media(max-width:640px){.navlinks{gap:14px;font-size:10px;}}

  /* PAGE LOADER — rocket launch sequence */
  #pageLoader{
    position:fixed;inset:0;z-index:200;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    transition:opacity .5s ease, visibility .5s ease;
  }
  #pageLoader.hide{opacity:0;visibility:hidden;pointer-events:none;}
  .loader-mark{
    font-family:var(--mono);font-weight:800;font-size:20px;color:var(--amber);
    letter-spacing:.02em;
  }
  .loader-rocket-wrap{position:relative;height:56px;display:flex;align-items:flex-end;justify-content:center;width:56px;}
  .loader-rocket{
    font-size:32px;display:inline-block;transform-origin:center;
    animation:rocketIdle 1.6s ease-in-out infinite;position:relative;z-index:1;
  }
  .loader-rocket::after{
    content:"";position:absolute;left:50%;bottom:-8px;width:10px;height:22px;transform:translateX(-50%);
    border-radius:50% 50% 60% 60%;filter:blur(4px);
    background:linear-gradient(180deg, rgba(245,166,35,0.9), rgba(245,166,35,0));
    animation:flamePulse .35s ease-in-out infinite alternate;
  }
  @keyframes rocketIdle{ 0%,100%{transform:translateY(0) rotate(-6deg);} 50%{transform:translateY(-5px) rotate(-3deg);} }
  @keyframes flamePulse{ from{ transform:translateX(-50%) scaleY(0.8); opacity:.7; } to{ transform:translateX(-50%) scaleY(1.15); opacity:1; } }
  #pageLoader.launch .loader-rocket{ animation:rocketLaunch .7s cubic-bezier(.4,0,.6,1) forwards; }
  @keyframes rocketLaunch{
    0%{transform:translateY(0) rotate(-6deg) scale(1); opacity:1;}
    100%{transform:translateY(-220px) rotate(-2deg) scale(.6); opacity:0;}
  }
  .loader-bar{
    width:140px;height:3px;border-radius:var(--r-pill);background:var(--border);overflow:hidden;position:relative;
  }
  .loader-bar-fill{
    height:100%;width:0%;border-radius:var(--r-pill);
    background:linear-gradient(90deg, var(--amber), var(--violet));
    transition:width .3s ease;
  }
  .loader-status{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.02em;min-height:16px;}
  .loader-pct{font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:700;}
  @media(prefers-reduced-motion:reduce){ .loader-rocket, .loader-rocket::after{animation:none;} }

  /* HERO */
  .hero{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 20%, rgba(139,127,214,0.18) 0%, transparent 60%);pointer-events:none;}
  /* Mouse-following spotlight — a soft light that tracks the pointer */
  .hero-spotlight{
    position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity .4s ease;
    background:radial-gradient(360px circle at var(--sx,50%) var(--sy,30%), rgba(245,166,35,0.14), transparent 65%);
  }
  .hero-spotlight.active{opacity:1;}
  @media(hover:none){ .hero-spotlight{display:none;} }
  .hero-name{
    font-family:var(--mono);font-weight:800;font-size:44px;letter-spacing:-0.01em;line-height:1.1;position:relative;z-index:1;
    background:linear-gradient(135deg, #FFFFFF 20%, var(--amber) 60%, var(--violet) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 60px rgba(245,166,35,0.25);
  }
  @media(max-width:640px){.hero-name{font-size:32px;}}
  .hero-role{font-family:var(--mono);color:var(--amber);font-size:16px;margin-top:14px;position:relative;z-index:1;}
  .hero-tagline{margin-top:16px;max-width:480px;color:var(--muted);font-size:15px;position:relative;z-index:1;}
  .hero-actions{display:flex;gap:14px;margin-top:32px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center;}
  .btn{font-family:var(--mono);font-size:13px;font-weight:600;padding:13px 26px;border-radius:var(--r-pill);border:1px solid var(--border);transition:transform .15s ease, box-shadow .15s ease, background .2s ease, color .2s ease;}
  .btn.primary{background:var(--amber);color:#0F0F14;border-color:var(--amber);box-shadow:0 8px 22px -8px rgba(245,166,35,0.55);}
  .btn.primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px -8px rgba(245,166,35,0.65);}
  .btn.primary:active{transform:translateY(0);box-shadow:0 6px 16px -8px rgba(245,166,35,0.5);}
  .btn.ghost{background:transparent;color:var(--text);}
  .btn.ghost:hover{border-color:var(--amber);color:var(--amber);}
  .hero-social{display:flex;gap:22px;margin-top:36px;position:relative;z-index:1;}
  .hero-social a{color:var(--muted);display:flex;align-items:center;justify-content:center;transition:color .2s ease, transform .2s ease;}
  .hero-social a:hover{color:var(--amber);transform:translateY(-2px);}

  /* SECTION shared */
  section{padding:var(--section-y) 0;border-top:1px solid var(--border);}
  @media(max-width:640px){section{padding:var(--section-y-mobile) 0;}}
  .section-title{font-family:var(--mono);font-weight:800;font-size:28px;line-height:1.2;margin-bottom:14px;position:relative;display:inline-block;letter-spacing:-0.01em;}
  .section-title::after{
    content:"";position:absolute;left:0;bottom:-10px;width:44px;height:3px;border-radius:2px;
    background:linear-gradient(90deg, var(--amber), var(--violet));
  }
  @media(max-width:640px){.section-title{font-size:23px;}}
  .section-sub{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:44px;margin-top:22px;}

  /* ABOUT */
  .about-grid{display:flex;flex-direction:column;gap:36px;}
  .about-card{
    background:linear-gradient(160deg, var(--panel) 0%, var(--bg-raised) 100%);
    border:1px solid var(--border);border-radius:var(--r-lg);
    padding:24px;max-width:340px;
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.6);
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .about-card:hover{transform:translateY(-4px);border-color:var(--violet);box-shadow:0 24px 44px -18px rgba(139,127,214,0.35);}
  .about-tag{font-family:var(--mono);font-size:12px;color:var(--amber);}
  .about-mode{font-family:var(--mono);font-size:12px;color:var(--violet);margin-top:4px;}
  .about-body{color:#C8C8D4;font-size:15.5px;line-height:1.85;max-width:560px;}
  .about-body p{margin-bottom:18px;}
  .about-body strong{color:var(--text);}
  .about-body .highlight{color:var(--amber);}
  .highlight{color:var(--amber);font-weight:600;}

  /* ACADEMIC TIMELINE */
  .timeline{display:flex;flex-direction:column;gap:20px;}
  .tl-card{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);
    padding:20px 22px;display:flex;gap:16px;align-items:flex-start;
    position:relative;overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .tl-card:hover{transform:translateY(-3px);border-color:var(--violet);box-shadow:0 16px 30px -18px rgba(139,127,214,0.4);}
  .tl-card.current{border-color:var(--amber);}
  .tl-icon{width:44px;height:44px;border-radius:var(--r-sm);background:var(--bg-raised);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .tl-year{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .tl-title{font-weight:700;font-size:16px;margin-top:2px;}
  .tl-org{color:var(--muted);font-size:13.5px;margin-top:3px;line-height:1.6;}
  .tl-loc{font-family:var(--mono);font-size:11px;color:var(--amber);margin-top:8px;display:flex;align-items:center;gap:4px;}

  /* SKILLS GRID */
  .skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:560px){.skills-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
  .skill-tile{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);
    padding:20px 12px;text-align:center;transition:transform .2s ease, border-color .2s ease;
  }
  .skill-tile:hover{transform:translateY(-3px);border-color:var(--violet);}
  .skill-icon{width:48px;height:48px;border-radius:var(--r-sm);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 8px 20px -8px rgba(139,127,214,0.5);}
  .skill-name{font-family:var(--mono);font-size:12.5px;font-weight:600;}

  /* ===== SKILL CUBES (flip on hover to reveal proficiency) ===== */
  .skill-cube{
    position:relative;perspective:900px;height:132px;padding:0 !important;
    background:transparent !important;border:none !important;
  }
  .skill-face{
    position:absolute;inset:0;border-radius:var(--r-md);backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px 10px;transition:transform .55s cubic-bezier(.2,.8,.2,1);
    border:1px solid var(--border);
  }
  .skill-front{background:var(--panel);transform:rotateY(0deg);}
  .skill-back{
    background:linear-gradient(160deg, var(--bg-raised), var(--panel));
    transform:rotateY(180deg);border-color:var(--violet);
  }
  .skill-cube:hover .skill-front{transform:rotateY(180deg);}
  .skill-cube:hover .skill-back{transform:rotateY(360deg);}
  .skill-cube:hover{border-color:transparent;}
  .skill-pct{font-family:var(--mono);font-weight:800;font-size:22px;color:var(--amber);}
  .skill-pct-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.03em;}
  .skill-bar{width:78%;height:5px;background:var(--border);border-radius:var(--r-pill);margin-top:10px;overflow:hidden;}
  .skill-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--amber),var(--violet));border-radius:var(--r-pill);transition:width 1.1s cubic-bezier(.2,.8,.2,1);}

  /* PROJECTS */
  .proj-stack{display:flex;flex-direction:column;gap:32px;}
  .proj-card{
    border-radius:var(--r-lg);padding:0;position:relative;overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 20px 40px -22px rgba(0,0,0,0.6);
  }
  /* Animated glow border sweep on hover — subtle, premium accent */
  .proj-card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;z-index:0;
    background:conic-gradient(from 0deg, transparent, var(--amber), transparent 35%);
    opacity:0;transition:opacity .4s ease;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:projBorderSpin 4s linear infinite;pointer-events:none;
  }
  .proj-card:hover::before{opacity:.55;}
  .proj-card::before{opacity:.14;}
  @keyframes projBorderSpin{ to{ transform:rotate(360deg); } }
  .proj-banner{
    height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
    border-bottom:1px solid var(--border);
  }
  .proj-banner::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.14) 1px, transparent 1px);
    background-size:16px 16px;
  }
  .proj-banner svg{position:relative;z-index:1;opacity:0.92;transition:opacity .35s ease, transform .35s ease;}

  /* Live preview screenshot — fades in over the banner on hover, only for
     cards with a public demo URL (data-live attribute drives the JS). */
  .proj-preview{
    position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .45s ease;
    background:var(--bg-raised);
  }
  .proj-preview img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
  .proj-preview .pp-label{
    position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9.5px;font-weight:700;
    padding:4px 9px;border-radius:var(--r-pill);background:rgba(15,15,20,0.75);color:#5ED98B;
    display:flex;align-items:center;gap:5px;letter-spacing:.03em;
  }
  .pp-label .pp-dot{width:6px;height:6px;border-radius:50%;background:#5ED98B;animation:ppPulse 1.4s ease-in-out infinite;}
  @keyframes ppPulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .proj-card:hover .proj-preview{opacity:1;}
